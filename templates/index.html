<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Translate — by Abhishi</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --bg:       #dce8f5;
            --surface:  #eaf2fb;
            --card:     #f4f8fd;
            --ink:      #0d1f35;
            --mid:      #3a6291;
            --accent:   #2c7be5;
            --soft:     #a8c4e0;
            --muted:    #7099be;
            --border:   #b8d0ea;
            --lavender: #c9d9f0;
        }

        html, body { height: 100%; }

        body {
            background: linear-gradient(135deg, #d0e4f7 0%, #e2edf8 40%, #cfdaf0 100%);
            color: var(--ink);
            font-family: 'DM Mono', monospace;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 1.5rem;
        }

        body::before {
            content: '';
            position: fixed;
            top: -120px; right: -120px;
            width: 480px; height: 480px;
            background: radial-gradient(circle, #aecef5 0%, transparent 70%);
            border-radius: 50%;
            pointer-events: none;
            z-index: 0;
        }
        body::after {
            content: '';
            position: fixed;
            bottom: -100px; left: -100px;
            width: 400px; height: 400px;
            background: radial-gradient(circle, #b8c9ef 0%, transparent 70%);
            border-radius: 50%;
            pointer-events: none;
            z-index: 0;
        }

        .wrapper {
            width: 100%;
            max-width: 820px;
            background: rgba(244, 248, 253, 0.72);
            backdrop-filter: blur(18px);
            -webkit-backdrop-filter: blur(18px);
            border: 1px solid rgba(184, 208, 234, 0.7);
            border-radius: 20px;
            padding: 2.8rem 3rem;
            position: relative;
            z-index: 1;
            box-shadow: 0 8px 40px rgba(44, 123, 229, 0.10), 0 2px 8px rgba(13,31,53,0.07);
            animation: rise 0.8s cubic-bezier(0.16,1,0.3,1) both;
        }

        @keyframes rise {
            from { opacity: 0; transform: translateY(28px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        header {
            display: flex;
            align-items: flex-end;
            justify-content: space-between;
            margin-bottom: 2.8rem;
            padding-bottom: 1.4rem;
            border-bottom: 2px solid var(--border);
        }

        .brand-name {
            font-family: 'Playfair Display', serif;
            font-weight: 900;
            font-size: 2.9rem;
            line-height: 1;
            letter-spacing: -0.02em;
            color: var(--ink);
        }

        .brand-name span { color: var(--accent); }

        .brand-sub {
            margin-top: 0.3rem;
            font-size: 0.62rem;
            font-weight: 500;
            letter-spacing: 0.28em;
            text-transform: uppercase;
            color: var(--muted);
        }

        .lang-pill {
            display: flex;
            align-items: center;
            gap: 0.55rem;
            background: var(--lavender);
            border: 1px solid var(--border);
            border-radius: 100px;
            padding: 0.45rem 1rem;
            font-size: 0.65rem;
            font-weight: 500;
            letter-spacing: 0.14em;
            text-transform: uppercase;
            color: var(--mid);
        }

        .lang-pill .arr { color: var(--accent); font-size: 0.9rem; }

        .translation-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1.4rem;
            margin-bottom: 1.6rem;
        }

        .panel { display: flex; flex-direction: column; gap: 0.55rem; }

        .panel-label {
            font-size: 0.62rem;
            font-weight: 500;
            letter-spacing: 0.26em;
            text-transform: uppercase;
            color: var(--mid);
        }

        textarea, .output-box {
            width: 100%;
            height: 210px;
            background: var(--card);
            border: 1.5px solid var(--border);
            border-radius: 10px;
            padding: 1.15rem 1.2rem;
            font-family: 'Playfair Display', serif;
            font-size: 1.15rem;
            font-weight: 700;
            line-height: 1.7;
            color: var(--ink);
            transition: border-color 0.22s;
        }

        textarea { resize: none; outline: none; }

        textarea::placeholder {
            color: var(--soft);
            font-weight: 700;
            font-style: italic;
        }

        textarea:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(44,123,229,0.10);
        }

        .output-box {
            overflow-y: auto;
            cursor: pointer;
        }

        .output-box.empty {
            color: var(--soft);
            font-style: italic;
        }

        .actions {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1.5rem;
            margin-bottom: 2.8rem;
        }

        .btn-translate {
            appearance: none;
            border: none;
            background: var(--accent);
            color: #fff;
            font-family: 'DM Mono', monospace;
            font-size: 0.68rem;
            font-weight: 500;
            letter-spacing: 0.26em;
            text-transform: uppercase;
            padding: 0.9rem 2.6rem;
            border-radius: 8px;
            cursor: pointer;
            transition: background 0.2s, transform 0.15s, box-shadow 0.2s;
            box-shadow: 0 4px 18px rgba(44,123,229,0.28);
        }

        .btn-translate:hover {
            background: #1a66d4;
            transform: translateY(-2px);
            box-shadow: 0 6px 24px rgba(44,123,229,0.38);
        }

        .btn-translate:active { transform: translateY(0); }

        .btn-clear {
            appearance: none;
            border: none;
            background: transparent;
            font-family: 'DM Mono', monospace;
            font-size: 0.62rem;
            font-weight: 500;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            color: var(--muted);
            cursor: pointer;
            padding: 0.5rem;
            text-decoration: underline;
            text-underline-offset: 3px;
            transition: color 0.2s;
        }

        .btn-clear:hover { color: var(--accent); }

        .loading-dots { display: none; gap: 4px; align-items: center; }
        .loading-dots span {
            width: 5px; height: 5px;
            background: #fff; border-radius: 50%;
            animation: dot 1.2s ease-in-out infinite;
        }
        .loading-dots span:nth-child(2) { animation-delay: 0.2s; }
        .loading-dots span:nth-child(3) { animation-delay: 0.4s; }
        @keyframes dot {
            0%,80%,100% { opacity:0.25; transform:scale(0.8); }
            40%          { opacity:1;    transform:scale(1); }
        }

        .meta-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            min-height: 1rem;
        }

        .char-count, .copy-hint {
            font-size: 0.58rem;
            font-weight: 500;
            letter-spacing: 0.12em;
            color: var(--muted);
        }

        .copy-hint {
            opacity: 0;
            transition: opacity 0.3s;
            color: var(--accent);
        }

        footer {
            border-top: 2px solid var(--border);
            padding-top: 1.2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .footer-credit {
            font-size: 0.62rem;
            font-weight: 500;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            color: var(--muted);
        }

        .footer-credit strong { color: var(--accent); font-weight: 500; }

        .footer-deco {
            font-family: 'Playfair Display', serif;
            font-weight: 700;
            font-size: 1rem;
            font-style: italic;
            color: var(--soft);
        }

        @media (max-width: 600px) {
            .wrapper { padding: 2rem 1.5rem; }
            .translation-grid { grid-template-columns: 1fr; }
            header { flex-direction: column; align-items: flex-start; gap: 0.75rem; }
            .brand-name { font-size: 2.2rem; }
        }

        /* Canvas background */
        #letterCanvas {
            position: fixed;
            inset: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
        }
    </style>
</head>
<body>

<!-- Floating letters background -->
<canvas id="letterCanvas"></canvas>

<div class="wrapper">

    <header>
        <div>
            <div class="brand-name">Trans<span>lāte</span></div>
            <div class="brand-sub">English to Hindi &nbsp;·&nbsp; by Abhishi</div>
        </div>
        <div class="lang-pill">
            <span>EN</span>
            <span class="arr">→</span>
            <span>हि</span>
        </div>
    </header>

    <form method="post" id="translateForm">
        <div class="translation-grid">

            <div class="panel">
                <div class="panel-label">Source — English</div>
                <textarea
                    name="data"
                    id="sourceText"
                    placeholder="Type something…"
                    maxlength="1000"
                    autocomplete="off"
                    spellcheck="true"
                >{{ data or '' }}</textarea>
                <div class="meta-row">
                    <span></span>
                    <span class="char-count"><span id="charCount">0</span> / 1000</span>
                </div>
            </div>

            <div class="panel">
                <div class="panel-label">Translation — हिन्दी</div>
                <div class="output-box {{ '' if translated_text else 'empty' }}" id="outputBox">
                    {{ translated_text if translated_text else 'अनुवाद यहाँ दिखेगा…' }}
                </div>
                <div class="meta-row">
                    <span class="copy-hint" id="copyHint">✓ Copied to clipboard</span>
                    <span class="char-count">Click to copy</span>
                </div>
            </div>

        </div>

        <div class="actions">
            <button type="button" class="btn-clear" id="clearBtn">Clear</button>
            <button type="submit" class="btn-translate" id="submitBtn">
                <span id="btnLabel">Translate</span>
                <span class="loading-dots" id="loadingDots">
                    <span></span><span></span><span></span>
                </span>
            </button>
        </div>
    </form>

    <footer>
        <div class="footer-credit">Crafted by <strong>Abhishi</strong> &nbsp;·&nbsp; Resume Project</div>
        <div class="footer-deco">अनुवाद</div>
    </footer>

</div>

<script>
    const textarea    = document.getElementById('sourceText');
    const charCount   = document.getElementById('charCount');
    const form        = document.getElementById('translateForm');
    const submitBtn   = document.getElementById('submitBtn');
    const btnLabel    = document.getElementById('btnLabel');
    const loadingDots = document.getElementById('loadingDots');
    const outputBox   = document.getElementById('outputBox');
    const copyHint    = document.getElementById('copyHint');

    textarea.addEventListener('input', () => { charCount.textContent = textarea.value.length; });
    charCount.textContent = textarea.value.length;

    form.addEventListener('submit', () => {
        if (!textarea.value.trim()) return;
        btnLabel.style.display = 'none';
        loadingDots.style.display = 'flex';
        submitBtn.disabled = true;
    });

    document.getElementById('clearBtn').addEventListener('click', () => {
        textarea.value = '';
        charCount.textContent = '0';
        textarea.focus();
    });

    outputBox.addEventListener('click', () => {
        const text = outputBox.innerText.trim();
        if (!text || outputBox.classList.contains('empty')) return;
        navigator.clipboard.writeText(text).then(() => {
            copyHint.style.opacity = '1';
            setTimeout(() => { copyHint.style.opacity = '0'; }, 2000);
        });
    });

    // ── Floating letters background ──
    const canvas = document.getElementById('letterCanvas');
    const ctx    = canvas.getContext('2d');

    const englishLetters = 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz'.split('');
    const hindiLetters   = 'अआइईउऊएऐओऔकखगघचछजझटठडढणतथदधनपफबभमयरलवशषसह'.split('');
    const allLetters     = [...englishLetters, ...hindiLetters];

    const COLORS = [
        'rgba(44,123,229,0.18)',
        'rgba(100,160,240,0.14)',
        'rgba(180,210,245,0.20)',
        'rgba(120,170,230,0.16)',
        'rgba(200,220,250,0.22)',
        'rgba(80,140,220,0.13)',
    ];

    let particles = [];

    function resize() {
        canvas.width  = window.innerWidth;
        canvas.height = window.innerHeight;
    }

    function randomBetween(a, b) { return a + Math.random() * (b - a); }

    function createParticle() {
        const size = randomBetween(14, 42);
        return {
            x:       randomBetween(0, canvas.width),
            y:       randomBetween(canvas.height + 20, canvas.height + 120),
            char:    allLetters[Math.floor(Math.random() * allLetters.length)],
            size,
            color:   COLORS[Math.floor(Math.random() * COLORS.length)],
            speedY:  randomBetween(0.3, 1.1),
            speedX:  randomBetween(-0.3, 0.3),
            wobble:  randomBetween(0, Math.PI * 2),
            wobbleSpeed: randomBetween(0.008, 0.025),
            wobbleAmp:   randomBetween(0.4, 1.6),
            rotation: randomBetween(-0.4, 0.4),
            rotSpeed: randomBetween(-0.004, 0.004),
            opacity:  randomBetween(0.5, 1),
        };
    }

    function initParticles() {
        particles = [];
        const count = Math.floor((canvas.width * canvas.height) / 18000);
        for (let i = 0; i < count; i++) {
            const p = createParticle();
            p.y = randomBetween(0, canvas.height); // spread initially
            particles.push(p);
        }
    }

    function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        for (const p of particles) {
            ctx.save();
            ctx.translate(p.x, p.y);
            ctx.rotate(p.rotation);
            ctx.globalAlpha = p.opacity;
            ctx.font = `${p.size}px 'Playfair Display', serif`;
            ctx.fillStyle = p.color;
            ctx.fillText(p.char, 0, 0);
            ctx.restore();

            // update
            p.wobble   += p.wobbleSpeed;
            p.x        += p.speedX + Math.sin(p.wobble) * p.wobbleAmp;
            p.y        -= p.speedY;
            p.rotation += p.rotSpeed;

            // recycle when off screen
            if (p.y < -60) {
                Object.assign(p, createParticle());
            }
        }

        requestAnimationFrame(draw);
    }

    window.addEventListener('resize', () => { resize(); initParticles(); });
    resize();
    initParticles();
    draw();
</script>

</body>
</html>
